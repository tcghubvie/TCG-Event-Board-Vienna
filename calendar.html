<body>

<h1>📅 SWU Kalender Wien</h1>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  padding: 20px;
  background: #f5f6f8;
}

.nav {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.nav button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: #007aff;
  color: white;
  cursor: pointer;
}

.nav span {
  font-weight: 600;
  font-size: 16px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
}

.day {
  background: white;
  border-radius: 10px;
  padding: 10px;
  min-height: 120px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);

  display: flex;
  flex-direction: column;
}

.date {
  font-weight: bold;
  margin-bottom: 6px;
}

.event {
  font-size: 11px;
  margin-top: 4px;
  background: #eee;
  padding: 3px 6px;
  border-radius: 4px;
  .event-link {
  text-decoration: none;
  color: inherit;
}

.event-link:hover {
  text-decoration: underline;
}
  .special {
  background: #ffe5e5;
  border-left: 3px solid #ff3b30;
  font-weight: 600;
}
</style>
<div style="margin-bottom: 20px;">
  <button onclick="prevMonth()">⬅️</button>
  <span id="monthLabel"></span>
  <button onclick="nextMonth()">➡️</button>
</div>

<div class="calendar" id="calendar"></div>

<script>
let currentDate = new Date();

async function loadCalendar() {
  const res = await fetch("events.json?=" + new Date().getTime());
  const events = await res.json();

  const container = document.getElementById("calendar");
  container.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleDateString("de-AT", {
      month: "long",
      year: "numeric"
    });

  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 1; i <= daysInMonth; i++) {
    const dayDiv = document.createElement("div");
    dayDiv.className = "day";

    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    dayDiv.innerHTML = `<div class="date">${i}</div>`;

    const dayEvents = events.filter(e => e.date === dateStr);

    dayEvents.forEach(e => {
      const el = document.createElement("div");
      el.className = "event " + (e.type === "special" ? "special" : "");
      el.innerHTML = e.link
  ? `<a href="${e.link}" target="_blank" class="event-link">
       ${e.time} ${e.shop}
     </a>`
  : `${e.time} ${e.shop}`;
      dayDiv.appendChild(el);
    });

    container.appendChild(dayDiv);
  }
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  loadCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  loadCalendar();
}

loadCalendar();
</script>

</body>
