<body>

<h1>📅 SWU Kalender Wien</h1>
  <a href="index.html" class="back-link">← Zur Weekly Übersicht</a>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  padding: 20px;
  background: #f5f6f8;
}

.nav {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.nav button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: #007aff;
  color: white;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  min-width: 50px;
}

.nav span {
  font-weight: 600;
  font-size: 16px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
}

.day {
  background: white;
  border-radius: 10px;
  padding: 10px;
  min-height: 120px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
}

.date {
  font-weight: bold;
  margin-bottom: 6px;
}

.event {
  font-size: 11px;
  margin-top: 4px;
  padding: 3px 6px;
  border-radius: 4px;
  background: #e6f0ff; /* hellblau */
}
  .back-link {
  display: inline-block;
  margin-bottom: 15px;
  text-decoration: none;
  color: #007aff;
  font-size: 14px;
}

.back-link:hover {
  text-decoration: underline;
}

/* LINK */
.event-link {
  text-decoration: none;
  color: inherit;
}

.event-link:hover {
  text-decoration: underline;
}

/* SPECIAL */
.event.special {
  background: #ffe5e5;
  border-left: 3px solid #ff3b30;
  font-weight: 600;
}
  .weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 10px;
  font-weight: 600;
  color: #555;
}

.weekdays div {
  text-align: center;
}
  .today {
  border: 2px solid #007aff;
  background: #e6f0ff;
}
  .legend {
  margin-bottom: 15px;
  display: flex;
  gap: 20px;
  font-size: 13px;
}

.legend-item {
  display: inline-block;
  width: 12px;
  height: 12px;
  margin-right: 6px;
  border-radius: 3px;
  vertical-align: middle;
}
  
.legend-entry {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: #555;
}

.legend-box {
  width: 24px;
  height: 16px;
  border-radius: 6px;
}

.legend-item.normal {
  background: #eee;
}

.legend-item.special {
  background: #ffe5e5;
  border-left: 3px solid #ff3b30;
}
  .event.conflict {
  background: #fff3cd;
  border-left: 3px solid #ff9500;
}
  .event-main {
  font-size: 11px;
  font-weight: 600;
}

.event-sub {
  font-size: 10px;
  opacity: 0.7;
  margin-top: 2px;
}
</style>
  
<div style="margin-bottom: 20px;">
  <button onclick="prevMonth()">⬅️</button>
  <span id="monthLabel"></span>
  <button onclick="nextMonth()">➡️</button>
</div>
  
 <div class="legend">
  <div class="legend-entry">
    <div class="event legend-box"></div>
    <span>Weekly</span>
  </div>

  <div class="legend-entry">
    <div class="event special legend-box"></div>
    <span>Special Event</span>
  </div>
</div>
  
<div class="weekdays">
  <div>Mo</div>
  <div>Di</div>
  <div>Mi</div>
  <div>Do</div>
  <div>Fr</div>
  <div>Sa</div>
  <div>So</div>
</div>
<div class="calendar" id="calendar"></div>

<script>
  function toMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
let currentDate = new Date();

async function loadCalendar() {
  const res = await fetch("events.json?=" + new Date().getTime());
  const events = await res.json();

  const container = document.getElementById("calendar");
  container.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleDateString("de-AT", {
      month: "long",
      year: "numeric"
    });

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
const offset = (firstDay + 6) % 7; // Montag = 0
  for (let i = 0; i < offset; i++) {
  const emptyDiv = document.createElement("div");
  container.appendChild(emptyDiv);
};

const today = new Date();
const todayStr = today.toISOString().split("T")[0];

for (let i = 1; i <= daysInMonth; i++) {
  const dayDiv = document.createElement("div");
  dayDiv.className = "day";

  const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
  
if (dateStr === todayStr) {
  dayDiv.classList.add("today");
}
  
    dayDiv.innerHTML = `<div class="date">${i}</div>`;

    const dayEvents = events.filter(e => e.date === dateStr);

    dayEvents.forEach(e => {
      const el = document.createElement("div");
      let conflict = dayEvents.some(other => {
  if (other === e) return false;

  const t1 = toMinutes(e.time);
  const t2 = toMinutes(other.time);

  return Math.abs(t1 - t2) < 120; // 2h Schwelle
});
     el.className =
  "event "
  + (e.type === "special" ? "special " : "")
  + (conflict ? "conflict" : "");

el.innerHTML = e.link
  ? `<a href="${e.link}" target="_blank" class="event-link">
       <div class="event-main">
         ${conflict ? "⚠️ " : ""}${e.time} ${e.shop}
       </div>
       ${e.event ? `<div class="event-sub">${e.event}</div>` : ""}
     </a>`
  : `
       <div class="event-main">
         ${conflict ? "⚠️ " : ""}${e.time} ${e.shop}
       </div>
       ${e.event ? `<div class="event-sub">${e.event}</div>` : ""}
    `;

dayDiv.appendChild(el);
      });
    container.appendChild(dayDiv);
  }
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  loadCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  loadCalendar();
}

loadCalendar();
</script>

</body>
