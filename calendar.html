<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>TCG Kalender Wien</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background: #f5f6f8;
    }

    h1 {
      margin-bottom: 20px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .day {
      background: white;
      border-radius: 10px;
      padding: 8px;
      min-height: 100px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .date {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .event {
      font-size: 12px;
      margin-top: 4px;
      background: #eee;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<h1>📅 TCG Kalender Wien</h1>

<div class="calendar" id="calendar"></div>

<script>
<script>
let currentDate = new Date();

async function loadCalendar() {
  const res = await fetch("events.json?=" + new Date().getTime());
  const events = await res.json();

  const container = document.getElementById("calendar");
  container.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  // Monat + Jahr anzeigen
  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleDateString("de-AT", {
      month: "long",
      year: "numeric"
    });

  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 1; i <= daysInMonth; i++) {
    const dayDiv = document.createElement("div");
    dayDiv.className = "day";

    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    dayDiv.innerHTML = `<div class="date">${i}</div>`;

    const dayEvents = events.filter(e => e.date === dateStr);

    dayEvents.forEach(e => {
      const el = document.createElement("div");
      el.className = "event";
      el.innerText = `${e.time} ${e.shop}`;
      dayDiv.appendChild(el);
    });

    container.appendChild(dayDiv);
  }
}

// Monatsnavigation
function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  loadCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  loadCalendar();
}

// Initial laden
loadCalendar();
</script>
    });

    container.appendChild(dayDiv);
  }
}

loadCalendar();
</script>

</body>
</html>
