<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWU Kalender Wien</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 10px;
      background: #f5f6f8;
      margin: 0;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 15px;
      color: #007aff;
      text-decoration: none;
      font-size: 14px;
    }

    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .nav button {
      padding: 6px 10px;
      border-radius: 8px;
      border: none;
      background: #007aff;
      color: white;
      font-size: 14px;
    }

    .nav span {
      font-weight: 600;
      font-size: 15px;
    }

    .legend {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .legend-box {
      width: 20px;
      height: 12px;
      border-radius: 4px;
      display: inline-block;
      margin-right: 5px;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      font-size: 12px;
      text-align: center;
      margin-bottom: 5px;
      color: #666;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0px;
      border-top: 1px solid #ddd;
      border-left: 1px solid #ddd;
    }

    .day {
      background: white;
      border-radius: 6px;
      padding: 4px;
      min-height: 60px;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .date {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .event {
       font-size: 9px;
  padding: 2px 5px;
  border-radius: 6px;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
    }

    .event.special {
      background: #ffe5e5;
      border-left: 3px solid #ff3b30;
    }

    .event.conflict {
      background: #fff3cd;
      border-left: 3px solid #ff9500;
    }

    .event-main {
      font-weight: 600;
    }

    .event-sub {
      font-size: 8px;
      opacity: 0.7;
    }

    .today {
      border: 2px solid #007aff;
    }

    .event-link {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>

<body>

<h1>📅 SWU Kalender Wien</h1>
<a href="index.html" class="back-link">← Zur Weekly Übersicht</a>

<div class="nav">
  <button onclick="prevMonth()">⬅️</button>
  <span id="monthLabel"></span>
  <button onclick="nextMonth()">➡️</button>
</div>

<div class="legend">
  <div><span class="legend-box" style="background:#e6f0ff;"></span>Weekly</div>
  <div><span class="legend-box" style="background:#ffe5e5;"></span>Special</div>
</div>

<div class="weekdays">
  <div>Mo</div><div>Di</div><div>Mi</div>
  <div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
</div>

<div id="calendar" class="calendar"></div>

<script>
function toMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

let currentDate = new Date();

async function loadCalendar() {
  const res = await fetch("events.json?=" + new Date().getTime());
  const events = await res.json();

  const container = document.getElementById("calendar");
  container.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleDateString("de-AT", {
      month: "long",
      year: "numeric"
    });

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const offset = (firstDay + 6) % 7;

  for (let i = 0; i < offset; i++) {
    container.appendChild(document.createElement("div"));
  }

  const todayStr = new Date().toISOString().split("T")[0];

  for (let i = 1; i <= daysInMonth; i++) {
    const dayDiv = document.createElement("div");
    dayDiv.className = "day";

    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    if (dateStr === todayStr) {
      dayDiv.classList.add("today");
    }

    dayDiv.innerHTML = `<div class="date">${i}</div>`;

    const dayEvents = events.filter(e => e.date === dateStr);

    dayEvents.forEach(e => {
      const el = document.createElement("div");

      const conflict = dayEvents.some(other => {
        if (other === e) return false;
        return Math.abs(toMinutes(e.time) - toMinutes(other.time)) < 120;
      });

      el.className =
        "event " +
        (e.type === "special" ? "special " : "") +
        (conflict ? "conflict" : "");

      el.innerHTML = e.link
        ? `<a href="${e.link}" target="_blank" class="event-link">
            <div class="event-main">${e.time} ${e.shop}</div>
            ${e.event ? `<div class="event-sub">${e.event}</div>` : ""}
          </a>`
        : `<div class="event-main">${e.time} ${e.shop}</div>`;

      dayDiv.appendChild(el);
    });

    container.appendChild(dayDiv);
  }
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  loadCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  loadCalendar();
}

loadCalendar();
</script>

</body>
</html>
