<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>SWU Wien Event Board</title>
 
   <style id="x8f3kd">
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f6f8;
  margin: 0;
  padding: 20px;
  color: #111;
}

h1 {
  margin-bottom: 30px;
}

.day {
  margin-bottom: 30px;
}

.day h2 {
  margin-bottom: 10px;
  font-size: 18px;
  color: #555;
}

.event {
  padding: 12px 16px;
  margin: 6px 0;
  border-radius: 10px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.event.conflict {
  background: #ffe5e5;
  border: 1px solid #ffb3b3;
}

.time {
  font-weight: 600;
}

.shop {
  color: #555;
  font-size: 14px;
}
</style>
</head>
<body>

<h1>Star Wars Unlimited – Wien Event Board</h1>

<div id="events"></div>

<script>
async function loadEvents() {
  const res = await fetch("events.json?="+ new Date().getTime());
  const events = await res.json();

  const grouped = {};
  events.forEach(e => {
    if (!grouped[e.date]) grouped[e.date] = [];
    grouped[e.date].push(e);
  });

  for (let date in grouped) {
    const dayDiv = document.createElement("div");
    dayDiv.className = "day";

    const title = document.createElement("h2");
    const d = new Date(date);
title.innerText = d.toLocaleDateString("de-AT", {
  weekday: "long",
  day: "2-digit",
  month: "long"
});
    dayDiv.appendChild(title);

    grouped[date].forEach((e, i, arr) => {
      let conflict = arr.some(other =>
        other !== e &&
        Math.abs(parseInt(other.time) - parseInt(e.time)) <= 1
      );

      const div = document.createElement("div");
      div.className = "event " + (conflict ? "conflict" : "normal");
      div.innerHTML = `
  <span class="time">${e.time}</span>
  <span class="shop">${e.shop}</span>
`;
      dayDiv.appendChild(div);
    });

    document.getElementById("events").appendChild(dayDiv);
  }
}

loadEvents();
</script>

</body>
</html>
