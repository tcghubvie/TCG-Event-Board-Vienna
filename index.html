<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#007aff">
  <title>SWU Wien Weekly</title>

  <script data-goatcounter="https://tcghub.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6f8;
      margin: 0;
      padding: 20px;
      color: #111;
    }

    h1 {
      margin-bottom: 30px;
    }
   
    .day {
      margin-bottom: 30px;
    }

    .day h2 {
      margin-bottom: 10px;
      font-size: 18px;
      color: #555;
    }

    .event {
      padding: 12px 16px;
      margin: 6px 0;
      border-radius: 10px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .event.conflict {
      background: #fff3cd;
      border-left: 4px solid #ff9500;
    }

    .link {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      color: #007aff;
      text-decoration: none;
    }

    .time {
      font-size: 14px;
      font-weight: 600;
    }

    .shop {
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<h1>Star Wars Unlimited – Wien Event Board</h1>
 <a href="calendar.html" class="link">📅 Zum Kalender</a>
<div id="events"></div>

<script>
  function toMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
async function loadEvents() {
  const res = await fetch("events.json?=" + new Date().getTime());
  const events = await res.json();

  const today = new Date();
  const todayStr = today.toISOString().split("T")[0];

 let generatedEvents = [];

events.forEach(e => {
  if (e.recurring) {
    for (let i = 0; i < 14; i++) {

      const d = new Date(today);
      d.setHours(12, 0, 0, 0);
      d.setDate(today.getDate() + i);

      if (d.getDay() === e.weekday) {
        const dateStr =
          d.getFullYear() + "-" +
          String(d.getMonth() + 1).padStart(2, '0') + "-" +
          String(d.getDate()).padStart(2, '0');

        generatedEvents.push({
          ...e,
          date: dateStr
        });
      }

    }
  }
});

  const allEvents = [
    ...events.filter(e => !e.recurring),
    ...generatedEvents
  ];


const next7 = new Date(today);
next7.setDate(today.getDate() + 7);

today.setHours(0,0,0,0);
next7.setHours(23,59,59,999);

const filteredEvents = allEvents
  .filter(e => {
    const d = new Date(e.date + "T12:00:00");
    return d >= today && d <= next7;
  })
  .sort((a, b) => a.date.localeCompare(b.date));

  const grouped = {};
filteredEvents.forEach(e => {
    if (!grouped[e.date]) grouped[e.date] = [];
    grouped[e.date].push(e);
  });

 Object.keys(grouped)
  .sort()
  .forEach(date => {

    const dayDiv = document.createElement("div");
    dayDiv.className = "day";

    const title = document.createElement("h2");
  const d = new Date(date);
    const isToday =
      d.getDate() === today.getDate() &&
      d.getMonth() === today.getMonth() &&
      d.getFullYear() === today.getFullYear();

    let formatted = d.toLocaleDateString("de-AT", {
      weekday: "long",
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

    title.innerText = isToday ? "Heute – " + formatted : formatted;

    dayDiv.appendChild(title);

    grouped[date].forEach((e, i, arr) => {
      let conflict = arr.some(other => {
        if (other === e) return false;

        const t1 = toMinutes(e.time);
        const t2 = toMinutes(other.time);

        const closeInTime = Math.abs(t1 - t2) < 120;
        const isSpecial = e.type === "special" || other.type === "special";

        return closeInTime && isSpecial;
      });

      const div = document.createElement("div");
      div.className = "event " + (conflict ? "conflict" : "");

      div.innerHTML = `
        <div>
          <div class="time">${conflict ? "⚠️ " : ""}${e.time}</div>
          <div class="shop">${e.shop}</div>
          <div class="meta">${e.event || ""} ${e.format ? "• " + e.format : ""}</div>
          ${e.link ? `<a href="${e.link}" target="_blank" class="link">Zur Anmeldung →</a>` : ""}
        </div>
      `;

      dayDiv.appendChild(div);
    });

    document.getElementById("events").appendChild(dayDiv);

});
 
 }
 
loadEvents();
</script>

</body>
</html>
